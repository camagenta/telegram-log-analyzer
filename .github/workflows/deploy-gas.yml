name: 🚀 Deploy to Google Apps Script

on:
  push:
    branches: [main]
  workflow_dispatch: # Manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy GAS Project

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🔧 Install clasp
        run: npm install -g @google/clasp

      - name: 🔑 Auth clasp
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          mkdir -p ~/.clasp
          printf '%s\n' "$CLASPRC_JSON" > ~/.clasprc.json
          chmod 600 ~/.clasprc.json
          echo "✅ Auth file: $(wc -c < ~/.clasprc.json) bytes"

      - name: 📝 Create .clasp.json from Secret
        env:
          SCRIPT_ID: ${{ secrets.GAS_SCRIPT_ID }}
        run: |
          cat > .clasp.json << EOF
          {
            "scriptId": "${SCRIPT_ID}",
            "rootDir": "src"
          }
          EOF
          echo "✅ .clasp.json created with Script ID: ${SCRIPT_ID}"

      - name: 🚀 Push to GAS
        run: clasp push -f

      - name: ✅ Verify Deployment
        run: |
          echo "✅ Deploy success!"
          clasp status
